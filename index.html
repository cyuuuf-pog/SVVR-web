<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>SVVR 360 Gallery (Gaze + Name)</title>

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>

    <!-- Community components used by the official 360 gallery guide -->
    <script src="https://unpkg.com/aframe-template-component@3.2.5/dist/aframe-template-component.min.js"></script>
    <script src="https://unpkg.com/aframe-layout-component@5.3.0/dist/aframe-layout-component.min.js"></script>
    <script src="https://unpkg.com/aframe-event-set-component@5.0.0/dist/aframe-event-set-component.min.js"></script>
    <script src="https://unpkg.com/aframe-proxy-event-component@2.2.1/dist/aframe-proxy-event-component.min.js"></script>

    <style>
      /* Name overlay */
      #nameOverlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0,0,0,0.7);
        z-index: 9999;
        padding: 16px;
      }
      #nameCard {
        width: min(420px, 100%);
        background: #111;
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 14px;
        padding: 18px;
        color: #fff;
        font-family: system-ui, -apple-system, "PingFang TC", "Noto Sans TC", Arial;
      }
      #nameCard h2 { margin: 0 0 10px; font-size: 18px; }
      #nameCard p { margin: 0 0 12px; opacity: 0.85; font-size: 14px; line-height: 1.4; }
      #nameInput {
        width: 100%;
        box-sizing: border-box;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid rgba(255,255,255,0.2);
        background: #000;
        color: #fff;
        font-size: 16px;
        outline: none;
      }
      #nameActions { display: flex; gap: 10px; margin-top: 12px; }
      .btn {
        flex: 1;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid rgba(255,255,255,0.2);
        background: #1b1b1b;
        color: #fff;
        font-size: 15px;
        cursor: pointer;
      }
      .btnPrimary { background: #2a2a2a; border-color: rgba(255,255,255,0.35); }
      .hint { margin-top: 10px; font-size: 12px; opacity: 0.75; }
    </style>

    <!-- Link template (same idea as the official guide: use ${thumb} and ${src}) -->
    <script id="link" type="text/html">
      <a-entity class="link clickable"
        geometry="primitive: plane; height: 0.9; width: 0.9"
        material="shader: flat; src: ${thumb}"
        sound="on: click; src: #click-sound"
        event-set__mouseenter="scale: 1.12 1.12 1"
        event-set__mouseleave="scale: 1 1 1"
        proxy-event="event: click; to: #image-360; as: fade"
        event-set__click="_target: #image-360; _delay: 300; material.src: ${src}">
      </a-entity>
    </script>

    <script>
      // --- Name logic: persist so even if iOS reloads, you won't ask again ---
      const STORAGE_KEY = "svvr_student_name";

      function getSavedName() {
        try { return localStorage.getItem(STORAGE_KEY) || ""; } catch { return ""; }
      }
      function saveName(name) {
        try { localStorage.setItem(STORAGE_KEY, name); } catch {}
      }

      function setHudName(name) {
        const hud = document.querySelector("#hudName");
        if (hud) hud.setAttribute("text", "value", `學生：${name}`);
      }

      window.addEventListener("DOMContentLoaded", () => {
        const overlay = document.getElementById("nameOverlay");
        const input = document.getElementById("nameInput");
        const btnStart = document.getElementById("btnStart");
        const btnReset = document.getElementById("btnReset");

        const saved = getSavedName();
        if (saved) {
          overlay.style.display = "none";
          setHudName(saved);
        } else {
          overlay.style.display = "flex";
          input.focus();
        }

        btnStart.addEventListener("click", () => {
          const name = (input.value || "").trim();
          if (!name) { input.focus(); return; }
          saveName(name);
          overlay.style.display = "none";
          setHudName(name);

          // iOS sometimes requires a user gesture before audio can play;
          // clicking Start counts as a gesture so click sound will work better.
        });

        btnReset.addEventListener("click", () => {
          try { localStorage.removeItem(STORAGE_KEY); } catch {}
          input.value = "";
          overlay.style.display = "flex";
          input.focus();
          setHudName("（未輸入）");
        });
      });
    </script>
  </head>

  <body style="margin:0;">
    <!-- Name overlay -->
    <div id="nameOverlay" style="display:none;">
      <div id="nameCard">
        <h2>請先輸入你的名字</h2>
        <p>完成後就可以用「凝視」點選縮圖切換場景。</p>
        <input id="nameInput" type="text" inputmode="text" placeholder="例如：王小明" />
        <div id="nameActions">
          <button class="btn btnPrimary" id="btnStart">開始</button>
          <button class="btn" id="btnReset">清除已儲存名字</button>
        </div>
        <div class="hint">※ 名字會儲存在瀏覽器（localStorage），iOS 就算偶發重整也不會一直要你重輸。</div>
      </div>
    </div>

    <a-scene>
      <a-assets>
        <audio id="click-sound" src="https://cdn.aframe.io/360-image-gallery-boilerplate/audio/click.ogg"></audio>

        <!-- Replace these 6 images with your own -->
        <img id="scene1" src="https://cdn.aframe.io/360-image-gallery-boilerplate/img/city.jpg" crossorigin="anonymous">
        <img id="scene1-thumb" src="https://cdn.aframe.io/360-image-gallery-boilerplate/img/thumb-city.jpg" crossorigin="anonymous">

        <img id="scene2" src="https://cdn.aframe.io/360-image-gallery-boilerplate/img/cubes.jpg" crossorigin="anonymous">
        <img id="scene2-thumb" src="https://cdn.aframe.io/360-image-gallery-boilerplate/img/thumb-cubes.jpg" crossorigin="anonymous">

        <img id="scene3" src="https://cdn.aframe.io/360-image-gallery-boilerplate/img/sechelt.jpg" crossorigin="anonymous">
        <img id="scene3-thumb" src="https://cdn.aframe.io/360-image-gallery-boilerplate/img/thumb-sechelt.jpg" crossorigin="anonymous">
      </a-assets>

      <!-- 360 background (same as guide, plus fade animations) -->
      <a-sky
        id="image-360"
        radius="10"
        src="#scene1"
        animation__fade="property: components.material.material.color; type: color; from: #FFF; to: #000; dur: 300; startEvents: fade"
        animation__fadeback="property: components.material.material.color; type: color; from: #000; to: #FFF; dur: 300; startEvents: animationcomplete__fade">
      </a-sky>

      <!-- Thumbnail panel group (layout around user) -->
      <a-entity
        id="thumbs"
        layout="type: line; margin: 1.1"
        position="-1.2 1.4 -2.6">
        <a-entity template="src: #link" data-src="#scene1" data-thumb="#scene1-thumb"></a-entity>
        <a-entity template="src: #link" data-src="#scene2" data-thumb="#scene2-thumb"></a-entity>
        <a-entity template="src: #link" data-src="#scene3" data-thumb="#scene3-thumb"></a-entity>
      </a-entity>

      <!-- HUD text (fixed in front of camera) -->
      <a-entity id="hud" position="0 1.85 -1.25">
        <a-text id="hudName"
          value="學生：（未輸入）"
          align="center"
          width="2.4"
          color="#FFFFFF">
        </a-text>
        <a-text
          value="凝視縮圖切換場景"
          align="center"
          width="2.4"
          position="0 -0.18 0"
          color="#DDDDDD">
        </a-text>
      </a-entity>

      <!-- Camera + gaze cursor (fuse) -->
      <a-camera>
        <a-cursor
          id="cursor"
          fuse="true"
          fuse-timeout="900"
          raycaster="objects: .clickable"
          animation__click="property: scale; from: 0.1 0.1 0.1; to: 1 1 1; easing: easeInCubic; dur: 150; startEvents: click"
          animation__clickreset="property: scale; to: 0.1 0.1 0.1; dur: 1; startEvents: animationcomplete__click"
          animation__fusing="property: scale; from: 1 1 1; to: 0.1 0.1 0.1; easing: easeInCubic; dur: 900; startEvents: fusing">
        </a-cursor>
      </a-camera>
    </a-scene>
  </body>
</html>
