<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>SVVR 三層架構（分散 Hotspot + 大型閱讀面板）</title>
  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>

  <style>
    #nameGate{
      position:fixed; inset:0;
      background:rgba(0,0,0,0.85);
      display:flex; align-items:center; justify-content:center;
      z-index:9999; padding:24px;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,"Noto Sans TC",sans-serif;
      color:#fff;
    }
    #nameCard{
      width:min(460px,100%);
      background:rgba(20,20,20,0.92);
      border-radius:14px;
      padding:18px;
      box-shadow:0 10px 30px rgba(0,0,0,0.35);
    }
    #nameCard h2{ margin:0 0 10px; font-size:18px; }
    #nameCard p{ margin:0 0 12px; font-size:13px; opacity:.9; line-height:1.5; }
    #nameRow{ display:flex; gap:10px; }
    #studentNameInput{
      flex:1; font-size:16px; padding:10px 12px; border-radius:10px;
      border:1px solid rgba(255,255,255,0.22); background:rgba(255,255,255,0.08);
      color:#fff; outline:none;
    }
    #startBtn{
      font-size:16px; padding:10px 14px; border-radius:10px; border:0;
      background:#2f7cff; color:#fff; cursor:pointer; white-space:nowrap;
    }
    #hint{ margin-top:10px; font-size:12px; opacity:.75; }
  </style>

  <script>
    const STORAGE_KEY_NAME  = 'svvr_student_name_v1';
    const STORAGE_KEY_STATE = 'svvr_state_v1';

    const TOPICS = {
      t1: {
        name: "Topic 1",
        hubPano: "#pano_t1_hub",
        objectives: [
          "了解 Topic 1 的學習目標（示範）",
          "能辨識 3 種代表性特徵（示範）"
        ],
        lessons: [
          { id: "t1_l1", name: "A", pano: "#pano_t1_l1", hotspotsGroup: "#hotspots-t1_l1", totalHotspots: 5 },
          { id: "t1_l2", name: "B", pano: "#pano_t1_l2", hotspotsGroup: "#hotspots-t1_l2", totalHotspots: 5 },
          { id: "t1_l3", name: "C", pano: "#pano_t1_l3", hotspotsGroup: "#hotspots-t1_l3", totalHotspots: 5 },
        ],
        quiz: {
          questions: [
            { q: "（Topic1）題目 1：示範？", options: ["A", "B", "C"], answer: 1, explain: "解析：正確答案是 B（示範）" },
            { q: "（Topic1）題目 2：示範？", options: ["A", "B", "C"], answer: 0, explain: "解析：正確答案是 A（示範）" },
            { q: "（Topic1）題目 3：示範？", options: ["A", "B", "C"], answer: 2, explain: "解析：正確答案是 C（示範）" },
          ]
        }
      },
      t2: {
        name: "Topic 2",
        hubPano: "#pano_t2_hub",
        objectives: ["（示範）目標 1", "（示範）目標 2"],
        lessons: [
          { id: "t2_l1", name: "D", pano: "#pano_t2_l1", hotspotsGroup: "#hotspots-t2_l1", totalHotspots: 5 },
          { id: "t2_l2", name: "E", pano: "#pano_t2_l2", hotspotsGroup: "#hotspots-t2_l2", totalHotspots: 5 },
          { id: "t2_l3", name: "F", pano: "#pano_t2_l3", hotspotsGroup: "#hotspots-t2_l3", totalHotspots: 5 },
        ],
        quiz: {
          questions: [
            { q: "（Topic2）題目 1：示範？", options: ["A", "B", "C"], answer: 2, explain: "解析：正確答案是 C（示範）" },
            { q: "（Topic2）題目 2：示範？", options: ["A", "B", "C"], answer: 1, explain: "解析：正確答案是 B（示範）" },
            { q: "（Topic2）題目 3：示範？", options: ["A", "B", "C"], answer: 0, explain: "解析：正確答案是 A（示範）" },
          ]
        }
      },
      t3: {
        name: "Topic 3",
        hubPano: "#pano_t3_hub",
        objectives: ["（示範）目標 1", "（示範）目標 2"],
        lessons: [
          { id: "t3_l1", name: "G", pano: "#pano_t3_l1", hotspotsGroup: "#hotspots-t3_l1", totalHotspots: 5 },
          { id: "t3_l2", name: "H", pano: "#pano_t3_l2", hotspotsGroup: "#hotspots-t3_l2", totalHotspots: 5 },
          { id: "t3_l3", name: "I", pano: "#pano_t3_l3", hotspotsGroup: "#hotspots-t3_l3", totalHotspots: 5 },
        ],
        quiz: {
          questions: [
            { q: "（Topic3）題目 1：示範？", options: ["A", "B", "C"], answer: 0, explain: "解析：正確答案是 A（示範）" },
            { q: "（Topic3）題目 2：示範？", options: ["A", "B", "C"], answer: 2, explain: "解析：正確答案是 C（示範）" },
            { q: "（Topic3）題目 3：示範？", options: ["A", "B", "C"], answer: 1, explain: "解析：正確答案是 B（示範）" },
          ]
        }
      }
    };

    let state = {
      version: 1,
      current: { level: "topicMenu", topicId: null, lessonId: null, enteredAt: null },
      progress: {},
      progressSeen: {},
      quiz: {},
      quizRuntime: null,
      logs: []
    };

    let hubProgressOpen = false;

    function saveState(){
      try { localStorage.setItem(STORAGE_KEY_STATE, JSON.stringify(state)); } catch(e){}
    }
    function loadState(){
      try {
        const raw = localStorage.getItem(STORAGE_KEY_STATE);
        if (!raw) return;
        const parsed = JSON.parse(raw);
        if (parsed && typeof parsed === 'object') state = parsed;
      } catch(e){}
    }

    function nowTs(){ return Date.now(); }
    function formatLocalTime(ts){
      const d = new Date(ts);
      const y = d.getFullYear();
      const m = String(d.getMonth()+1).padStart(2,'0');
      const day = String(d.getDate()).padStart(2,'0');
      const h = String(d.getHours()).padStart(2,'0');
      const min = String(d.getMinutes()).padStart(2,'0');
      const s = String(d.getSeconds()).padStart(2,'0');
      return `${y}-${m}-${day} ${h}:${min}:${s}`;
    }
    function currentSceneDuration(){
      const enteredAt = state?.current?.enteredAt;
      if (!enteredAt) return 0;
      return Math.max(0, Number(((Date.now() - enteredAt) / 1000).toFixed(1)));
    }
    function setCurrentScene(level, topicId=null, lessonId=null){
      state.current = { level, topicId, lessonId, enteredAt: nowTs() };
    }
    function buildLogEntry(type, extra={}){
      const topicId = extra.topic_id ?? extra.topicId ?? state?.current?.topicId ?? '';
      const sceneId = extra.scene_id ?? extra.sceneId ?? state?.current?.lessonId ?? (topicId ? `${topicId}_hub` : state?.current?.level || 'topic_menu');
      const entry = {
        time: formatLocalTime(nowTs()),
        topic_id: topicId || '',
        scene_id: sceneId || '',
        event_type: type || '',
        hotspot_id: extra.hotspot_id ?? extra.hotspotId ?? '',
        question_id: extra.question_id ?? '',
        selected_option: extra.selected_option ?? '',
        correct_answer: extra.correct_answer ?? '',
        is_correct: extra.is_correct ?? '',
        duration_in_scene: extra.duration_in_scene ?? currentSceneDuration()
      };
      return entry;
    }
    function logEvent(type, extra={}){
      state.logs.push(buildLogEntry(type, extra));
      saveState();
    }

    function qs(sel){ return document.querySelector(sel); }
    const RAYCAST_PARK_POS = '0 -999 5';
    function parkForRaycast(sel, park){
      const el = typeof sel === 'string' ? qs(sel) : sel;
      if (!el) return;
      if (!el.dataset.homePosition) {
        const p = el.getAttribute('position');
        if (p && typeof p === 'object') el.dataset.homePosition = `${p.x} ${p.y} ${p.z}`;
        else el.dataset.homePosition = (p || '0 0 0');
      }
      el.setAttribute('position', park ? RAYCAST_PARK_POS : el.dataset.homePosition);
    }
    function setVisible(sel, visible){
      const el = qs(sel);
      if (!el) return;
      el.setAttribute('visible', !!visible);
    }
    function setText(sel, value){
      const el = qs(sel);
      if (!el) return;
      el.setAttribute('text', 'value', value);
    }
    function isEntityVisible(sel){
      const el = qs(sel);
      return !!(el && el.getAttribute('visible'));
    }
    function isAnyOverlayOpen(){
      const typingOpen = !!(document.getElementById('gptTypeOverlay') && document.getElementById('gptTypeOverlay').style.display !== 'none');
      return isEntityVisible('#infoPanel') || isEntityVisible('#gptVrPanel') || isEntityVisible('#hubProgressPanel') || typingOpen;
    }
    function activeOverlayType(){
      if (isEntityVisible('#infoPanel')) return 'info';
      if (isEntityVisible('#gptVrPanel')) return 'gpt';
      if (isEntityVisible('#hubProgressPanel')) return 'progress';
      if (document.getElementById('gptTypeOverlay') && document.getElementById('gptTypeOverlay').style.display !== 'none') return 'gptTyping';
      return '';
    }

    function hideAllPages(){
      ['#pageTopicMenu', '#pageHub', '#pageQuiz', '#pageLesson'].forEach(sel => {
        setVisible(sel, false);
        parkForRaycast(sel, true);
      });
      document.querySelectorAll('[id^="pageLesson-"]').forEach(el => {
        el.setAttribute('visible', false);
        parkForRaycast(el, true);
      });
    }

    function hideAllHotspotGroups(){
      for (const t of Object.values(TOPICS)) {
        for (const lesson of t.lessons) {
          setVisible(lesson.hotspotsGroup, false);
          parkForRaycast(lesson.hotspotsGroup, true);
        }
      }
    }

    function setSky(srcSelector){
      const sky = qs('#sky');
      if (!sky) return;
      sky.setAttribute('src', srcSelector);
      sky.setAttribute('material', 'src', srcSelector);
    }

    function setHud(title){
      const name = localStorage.getItem(STORAGE_KEY_NAME) || '未命名';
      setText('#hudText', `${name}｜${title}`);
    }

    function setHudVisible(show){
      const hud = qs('#hud');
      if (!hud) return;
      hud.setAttribute('visible', !!show);
    }

    function toggleHubProgress(force){
      const panel = qs('#hubProgressPanel');
      const backdrop = qs('#hubProgressBackdrop');
      if (!panel) return;
      const wasOpen = hubProgressOpen;
      hubProgressOpen = (force !== undefined) ? !!force : !hubProgressOpen;
      panel.setAttribute('visible', hubProgressOpen);
      if (backdrop) backdrop.setAttribute('visible', hubProgressOpen);
      setText('#hubQuizStatus', hubProgressOpen ? '選擇題：先關閉進度面板再開始' : (isTopicComplete(state.current.topicId) ? '選擇題：已解鎖' : '選擇題：完成所有單元後解鎖'));
      if (hubProgressOpen !== wasOpen) {
        logEvent(hubProgressOpen ? 'progress_open' : 'progress_close', {
          topic_id: state?.current?.topicId || '',
          scene_id: state?.current?.lessonId || (state?.current?.topicId ? `${state.current.topicId}_hub` : 'topic_menu')
        });
      }
      updateUiLock();
    }

    function setClickableLock(locked){
      document.querySelectorAll('[data-hotspot="true"]').forEach(el => {
        if (locked) el.classList.remove('clickable');
        else el.classList.add('clickable');
      });
      document.querySelectorAll('[data-ui="true"]').forEach(el => {
        if (locked) el.classList.remove('clickable');
        else el.classList.add('clickable');
      });
      qs('#infoCloseBtn')?.classList.add('clickable');
    }

    function updateUiLock(){
      const locked = isAnyOverlayOpen();
      setClickableLock(locked);
      if (!locked) return;
      const t = activeOverlayType();
      if (t === 'info') qs('#infoCloseBtn')?.classList.add('clickable');
      if (t === 'progress') {
        qs('#btnCloseProgress')?.classList.add('clickable');
        qs('#btnOpenProgress')?.classList.add('clickable');
      }
      if (t === 'gpt') qs('#gptCloseBtn')?.classList.add('clickable');
    }
    function closeInfoPanel(){
      setVisible('#infoPanel', false);
      updateUiLock();
    }
    function closeProgressPanel(){
      if (!hubProgressOpen) return;
      toggleHubProgress(false);
    }

    function goTopicMenu(){
      closeGptVr();
      gptCloseTyping();
      toggleHubProgress(false);
      hideAllHotspotGroups();
      setCurrentScene('topicMenu', null, null);
      saveState();
      closeInfoPanel();

      hideAllPages();
      setSky('#pano_topic_menu');
      setHudVisible(false);
      const studentName = localStorage.getItem(STORAGE_KEY_NAME) || 'Student';
      setText('#topicMenuTitle', `Menu
${studentName}`);
      parkForRaycast('#pageTopicMenu', false);
      setVisible('#pageTopicMenu', true);

      logEvent('nav_topic_menu', { scene_id: 'topic_menu' });
    }

    function initLessonProgress(lesson){
      if (!state.progress[lesson.id]) {
        state.progress[lesson.id] = {
          doneHotspots: 0,
          totalHotspots: lesson.totalHotspots || 5,
          completed: false
        };
      } else {
        state.progress[lesson.id].totalHotspots = lesson.totalHotspots || state.progress[lesson.id].totalHotspots || 5;
      }
      state.progressSeen ||= {};
      state.progressSeen[lesson.id] ||= {};
      saveState();
    }

    function isTopicComplete(topicId){
      const topic = TOPICS[topicId];
      if (!topic) return false;
      for (const lesson of topic.lessons) {
        initLessonProgress(lesson);
        if (!state.progress[lesson.id]?.completed) return false;
      }
      return true;
    }

    function refreshHubUI(topicId){
      const topic = TOPICS[topicId];
      if (!topic) return;

      setText('#hubTitle', `${topic.name}`);
      setText('#hubObjectives', topic.objectives.map((o,i)=>`${i+1}. ${o}`).join('\n'));

      setText('#hubProgressTopicTitle', `${topic.name}`);
      setText('#hubProgressTopicSub', 'Progress');

      let completedCount = 0;
      topic.lessons.forEach((lesson, idx) => {
        initLessonProgress(lesson);
        const p = state.progress[lesson.id];
        const ratio = Math.max(0, Math.min(1, p.doneHotspots / p.totalHotspots));
        const percent = Math.round(ratio * 100);
        if (p.completed) completedCount += 1;

        setText(`#hubProgressRowLabel${idx+1}`, `${lesson.name}`);
        setText(`#hubProgressText${idx+1}`, `${percent}%`);
        setText(`#hubProgressStatus${idx+1}`, p.completed ? '已完成' : `已完成 ${p.doneHotspots}/${p.totalHotspots}`);

        updateProgressBar(`#hubBarFill${idx+1}`, ratio);
      });

      setText('#hubProgressSummary', `Topic 完成度：${completedCount}/${topic.lessons.length} 單元`);

      const unlocked = isTopicComplete(topicId);
      setText('#hubQuizStatus', unlocked ? '選擇題：已解鎖' : '選擇題：完成所有單元後解鎖');

      const quizState = state.quiz[topicId];
      const quizBtn = qs('#btnStartQuiz');
      if (quizBtn) {
        const canStart = unlocked && !(quizState && quizState.done);
        quizBtn.setAttribute('material', 'color', canStart ? '#2f7cff' : '#444');
        quizBtn.setAttribute('data-enabled', canStart ? 'true' : 'false');
      }

      if (quizState && quizState.done) {
        const acc = Math.round((quizState.score / quizState.total) * 100);
        const lines = [
          `測驗完成 ✅  正確率：${acc}%（${quizState.score}/${quizState.total}）`,
          '',
          ...quizState.details.map((d, i) => `Q${i+1}：${d.correct ? '✅' : '❌'}  ${d.explain}`)
        ];
        setVisible('#hubQuizResultPanel', true);
        setText('#hubQuizResultText', lines.join('\n'));
      } else {
        setVisible('#hubQuizResultPanel', false);
        setText('#hubQuizResultText', '');
      }
    }

    function patchHubLessonButtons(topicId){
      ['t1','t2','t3'].forEach(id => {
        const active = id === topicId;
        setVisible(`#hubLessonGroup-${id}`, active);
        parkForRaycast(`#hubLessonGroup-${id}`, !active);
      });
      const quizBtn = qs('#btnStartQuiz');
      if (quizBtn) quizBtn.setAttribute('ui-action', `action: startQuiz; a: ${topicId}`);
    }

    function goHub(topicId){
      closeGptVr();
      gptCloseTyping();
      toggleHubProgress(false);
      hideAllHotspotGroups();
      const topic = TOPICS[topicId];
      if (!topic) return;

      patchHubLessonButtons(topicId);

      setCurrentScene('hub', topicId, null);
      saveState();
      closeInfoPanel();

      hideAllPages();
      setSky(topic.hubPano);
      setHudVisible(false);

      parkForRaycast('#pageHub', false);
      setVisible('#pageHub', true);
      refreshHubUI(topicId);

      logEvent('nav_hub', { topic_id: topicId, scene_id: `${topicId}_hub` });
    }

    function goLesson(topicId, lessonId){
      closeGptVr();
      gptCloseTyping();
      toggleHubProgress(false);
      const topic = TOPICS[topicId];
      if (!topic) return;
      const lesson = topic.lessons.find(x => x.id === lessonId);
      if (!lesson) return;

      setCurrentScene('lesson', topicId, lessonId);
      saveState();
      closeInfoPanel();

      hideAllPages();
      setSky(lesson.pano);
      setHudVisible(false);

      parkForRaycast(`#pageLesson-${lesson.id}`, false);
      setVisible(`#pageLesson-${lesson.id}`, true);
      hideAllHotspotGroups();
      parkForRaycast(lesson.hotspotsGroup, false);
      setVisible(lesson.hotspotsGroup, true);

      initLessonProgress(lesson);

      logEvent('nav_lesson', { topic_id: topicId, scene_id: lessonId });
    }

    function faceCameraYaw(panelEl){
      const cam = qs('[camera]');
      if (!panelEl || !cam || !window.THREE) return;
      const panelPos = new THREE.Vector3();
      const camPos = new THREE.Vector3();
      panelEl.object3D.getWorldPosition(panelPos);
      cam.object3D.getWorldPosition(camPos);
      const dx = camPos.x - panelPos.x;
      const dz = camPos.z - panelPos.z;
      const yaw = Math.atan2(dx, dz) * (180 / Math.PI);
      panelEl.setAttribute('rotation', `0 ${yaw} 0`);
    }

    function updateProgressBar(fillSel, ratio, baseWidth = 1.88){
      const fill = qs(fillSel);
      if (!fill) return;
      const safeRatio = Math.max(0, Math.min(1, ratio || 0));
      const width = Math.max(0.001, Number((baseWidth * safeRatio).toFixed(4)));
      const centerX = Number((-baseWidth / 2 + width / 2).toFixed(4));
      fill.setAttribute('width', width);
      fill.setAttribute('position', `${centerX} -0.02 0.01`);
      fill.setAttribute('visible', safeRatio > 0);
    }

    function markHotspotDone(topicId, lessonId, hotspotId){
      const topic = TOPICS[topicId];
      if (!topic) return;
      const lesson = topic.lessons.find(x => x.id === lessonId);
      if (!lesson) return;

      initLessonProgress(lesson);
      const p = state.progress[lesson.id];

      if (state.progressSeen?.[lesson.id]?.[hotspotId]) return;
      state.progressSeen[lesson.id][hotspotId] = true;

      p.doneHotspots = Math.min(p.totalHotspots, (p.doneHotspots || 0) + 1);
      p.completed = (p.doneHotspots >= p.totalHotspots);
      saveState();

      logEvent('hotspot_open', { topic_id: topicId, scene_id: lessonId, hotspot_id: hotspotId });
    }

    
    // 讓面板只做水平朝向鏡頭，避免整個 UI 傾斜變形
    AFRAME.registerComponent('face-center', {
      tick: function(){
        if (!this.el || !this.el.object3D || !window.THREE) return;
        const cam = document.querySelector('[camera]');
        if (!cam || !cam.object3D) return;

        const panelPos = new THREE.Vector3();
        const camPos = new THREE.Vector3();
        this.el.object3D.getWorldPosition(panelPos);
        cam.object3D.getWorldPosition(camPos);

        const dx = camPos.x - panelPos.x;
        const dz = camPos.z - panelPos.z;
        const yaw = Math.atan2(dx, dz) * (180 / Math.PI);
        this.el.setAttribute('rotation', `0 ${yaw} 0`);
      }
    });

AFRAME.registerComponent('hotspot-panel', {
      schema: {
        img: { type: 'selector' },
        side: { default: 'right' },
        distance: { default: 1.0 },
        hid: { default: '' }
      },
      init: function(){
        this.onClick = () => {
          if (isAnyOverlayOpen()) return;
          const panel = qs('#infoPanel');
          const imgPlane = qs('#infoImage');
          if (!panel || !imgPlane || !window.THREE) return;

          const { topicId, lessonId } = state.current || {};
          if (!topicId || !lessonId) return;

          const hotspotId = this.data.hid || this.el.getAttribute('id') || ('hs_' + Math.random());
          markHotspotDone(topicId, lessonId, hotspotId);

          const imgEl = this.data.img;
          if (imgEl) imgPlane.setAttribute('material', 'src', `#${imgEl.id}`);

          const hotspotPos = new THREE.Vector3();
          this.el.object3D.getWorldPosition(hotspotPos);
          const cam = qs('[camera]');
          const p = hotspotPos.clone();
          const d = this.data.distance || 1.0;
          let offset = new THREE.Vector3(d * 0.72, 0, 0.22);
          if (this.data.side === 'left') offset.set(-d * 0.72, 0, 0.22);
          if (this.data.side === 'up') offset.set(0, d * 0.42, 0.22);
          if (this.data.side === 'down') offset.set(0, -d * 0.42, 0.22);
          p.add(offset);

          if (cam && cam.object3D){
            const camPos = new THREE.Vector3();
            const panelDir = new THREE.Vector3().subVectors(p, cam.object3D.getWorldPosition(camPos)).normalize();
            p.add(panelDir.multiplyScalar(0.22));
          }

          panel.setAttribute('position', `${p.x} ${p.y} ${p.z}`);
          panel.setAttribute('visible', true);
          faceCameraYaw(panel);

          updateUiLock();
        };
        this.el.addEventListener('click', this.onClick);
      },
      remove: function(){
        this.el.removeEventListener('click', this.onClick);
      }
    });

    function startQuiz(topicId){
      closeGptVr();
      gptCloseTyping();
      toggleHubProgress(false);
      hideAllHotspotGroups();
      if (!isTopicComplete(topicId)) return;
      if (state.quiz[topicId]?.done) return;

      closeInfoPanel();
      hideAllPages();
      parkForRaycast('#pageQuiz', false);
      setVisible('#pageQuiz', true);
      setHudVisible(true);
      setHud(`測驗｜${TOPICS[topicId].name}`);

      state.quizRuntime = { topicId, idx: 0, chosen: [], startedAt: nowTs() };
      saveState();

      renderQuizQuestion();
      logEvent('quiz_start', { topic_id: topicId, scene_id: `${topicId}_quiz` });
    }

    function renderQuizQuestion(){
      const rt = state.quizRuntime;
      if (!rt) return;
      const topic = TOPICS[rt.topicId];
      const qObj = topic.quiz.questions[rt.idx];

      setText('#quizTitle', `${topic.name}｜小測驗（${rt.idx+1}/${topic.quiz.questions.length}）`);
      setText('#quizQuestion', qObj.q);

      qObj.options.forEach((opt, i) => {
        setText(`#quizOptText${i+1}`, opt);
        const btn = qs(`#quizOptBtn${i+1}`);
        if (btn) btn.setAttribute('material', 'color', '#333');
      });

      setText('#quizNextText', (rt.idx < topic.quiz.questions.length-1) ? '下一題' : '送出');
    }

    function chooseOption(optIndex){
      const rt = state.quizRuntime;
      if (!rt) return;
      const topic = TOPICS[rt.topicId];
      const qObj = topic.quiz.questions[rt.idx];

      rt.chosen[rt.idx] = optIndex;
      saveState();

      for (let i=0;i<qObj.options.length;i++){
        const btn = qs(`#quizOptBtn${i+1}`);
        if (btn) btn.setAttribute('material', 'color', (i===optIndex) ? '#2f7cff' : '#333');
      }

      logEvent('quiz_choose', {
        topic_id: rt.topicId,
        scene_id: `${rt.topicId}_quiz`,
        question_id: `q${rt.idx+1}`,
        selected_option: qObj.options[optIndex] ?? optIndex
      });
    }

    function prevQuiz(){
      const rt = state.quizRuntime;
      if (!rt) return;
      if (rt.idx <= 0) return;
      rt.idx -= 1;
      saveState();
      renderQuizQuestion();
      logEvent('quiz_prev', { topicId: rt.topicId, data: { q: rt.idx } });
    }

    function nextOrSubmitQuiz(){
      const rt = state.quizRuntime;
      if (!rt) return;
      const topic = TOPICS[rt.topicId];
      const total = topic.quiz.questions.length;

      if (rt.chosen[rt.idx] === undefined) return;

      if (rt.idx < total-1){
        rt.idx += 1;
        saveState();
        renderQuizQuestion();
        return;
      }

      let score = 0;
      const details = topic.quiz.questions.map((q, i) => {
        const chosen = rt.chosen[i];
        const correct = (chosen === q.answer);
        if (correct) score += 1;
        return { chosen, correct, explain: q.explain };
      });

      state.quiz[rt.topicId] = {
        done: true,
        score,
        total,
        answers: rt.chosen.slice(),
        details,
        ts: nowTs()
      };
      state.quizRuntime = null;
      saveState();

      topic.quiz.questions.forEach((q, i) => {
        const chosenIndex = rt.chosen[i];
        logEvent('quiz_submit', {
          topic_id: rt.topicId,
          scene_id: `${rt.topicId}_quiz`,
          question_id: `q${i+1}`,
          selected_option: q.options[chosenIndex] ?? '',
          correct_answer: q.options[q.answer] ?? q.answer,
          is_correct: chosenIndex === q.answer ? 'true' : 'false',
          duration_in_scene: Number((((nowTs() - (rt.startedAt || nowTs())) / 1000)).toFixed(1))
        });
      });

      goHub(rt.topicId);
    }

    function downloadLog(){
      try{
        const name = localStorage.getItem(STORAGE_KEY_NAME) || 'user';
        logEvent('download_log', {
          topic_id: state?.current?.topicId || '',
          scene_id: state?.current?.lessonId || (state?.current?.topicId ? `${state.current.topicId}_hub` : 'topic_menu')
        });
        const payload = JSON.stringify(state.logs, null, 2);
        const blob = new Blob([payload], {type:'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `svvr_log_${name}.json`;
        document.body.appendChild(a);
        a.click();
        setTimeout(() => { try{ a.remove(); }catch(e){} }, 0);
        URL.revokeObjectURL(url);
      }catch(e){}
    }

    AFRAME.registerComponent('ui-action', {
      schema: { action: {type:'string'}, a: {type:'string'}, b:{type:'string'} },
      init: function(){
        this.onClick = () => {
          const act = this.data.action;
          const closers = ['closeInfo','gptClose','toggleProgress'];
          if (isAnyOverlayOpen()) {
            const overlay = activeOverlayType();
            if (!(overlay === 'progress' && act === 'toggleProgress') && !(overlay === 'info' && act === 'closeInfo') && !(overlay === 'gpt' && act === 'gptClose')) {
              return;
            }
          }

          if (act === 'goTopicMenu') return goTopicMenu();
          if (act === 'goHub')       return goHub(this.data.a);
          if (act === 'goLesson')    return goLesson(this.data.a, this.data.b);
          if (act === 'startQuiz') {
            if (qs('#btnStartQuiz')?.getAttribute('data-enabled') !== 'true') return;
            return startQuiz(this.data.a);
          }
          if (act === 'chooseOpt')   return chooseOption(parseInt(this.data.a,10));
          if (act === 'prevQuiz')    return prevQuiz();
          if (act === 'nextQuiz')    return nextOrSubmitQuiz();
          if (act === 'closeInfo')   return closeInfoPanel();
          if (act === 'downloadLog') return downloadLog();
          if (act === 'toggleProgress') return toggleHubProgress();
          if (act === 'openGPT')  return openGptVr();
          if (act === 'gptClose') return closeGptVr();
          if (act === 'gptRecStart') return gptStartRecording();
          if (act === 'gptRecStop') return gptStopRecording(false);
          if (act === 'gptSend') return gptSend();
          if (act === 'gptType') return gptOpenTyping();
        };
        this.el.addEventListener('click', this.onClick);
      },
      remove: function(){
        this.el.removeEventListener('click', this.onClick);
      }
    });

    
    // =========================
    // GPT VR：語音（錄音上傳轉文字）+ 打字備用
    // =========================
    let gptRT = {
      transcript: '',
      busy: false,
      rec: null,
      chunks: [],
      stream: null
    };

    const GPT_MAX_RECORD_MS = 8000; // 防 payload 過大（建議 5~10 秒）
    let gptRecordTimer = null;

    function gptSetStatus(s){ setText('#gptVrStatus', `狀態：${s}`); }
    function gptSetTranscript(t){
      gptRT.transcript = (t || '').trim();
      setText('#gptVrTranscript', `輸入內容：\n${gptRT.transcript || '（尚未輸入）'}`);
    }
    function gptSetAnswer(t){
      setText('#gptVrAnswer', `AI 回答：\n${t || '（尚未送出）'}`);
    }

    function openGptVr(){ if (isEntityVisible('#gptVrPanel')) return; setVisible('#gptVrPanel', true); gptSetStatus('待命'); updateUiLock(); logEvent('gpt_open', { topic_id: state?.current?.topicId || '', scene_id: state?.current?.lessonId || (state?.current?.topicId ? `${state.current.topicId}_hub` : 'topic_menu') }); }
    function closeGptVr(){ const wasOpen = isEntityVisible('#gptVrPanel'); setVisible('#gptVrPanel', false); gptStopRecording(true); updateUiLock(); if (wasOpen) logEvent('gpt_close', { topic_id: state?.current?.topicId || '', scene_id: state?.current?.lessonId || (state?.current?.topicId ? `${state.current.topicId}_hub` : 'topic_menu') }); }

    async function gptStartRecording(){
      // iOS/Safari 可能不支援 MediaRecorder
      if (!window.MediaRecorder) {
        gptSetStatus('此瀏覽器不支援錄音（建議改用「⌨ 打字」）');
        gptSetAnswer('（提示）iOS Safari 某些版本沒有 MediaRecorder，因此無法直接錄音。');
        return;
      }
      if (gptRT.busy) return;
      if (gptRT.rec) return;

      gptSetStatus('準備錄音…');

      try{
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        gptRT.stream = stream;
        gptRT.chunks = [];

        const candidates = [
          'audio/webm;codecs=opus',
          'audio/webm',
          'audio/mp4',
          'audio/m4a'
        ];
        let mimeType = '';
        for (const c of candidates){
          if (window.MediaRecorder && MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(c)){
            mimeType = c; break;
          }
        }

        const rec = new MediaRecorder(stream, mimeType ? { mimeType } : undefined);
        gptRT.rec = rec;

        rec.ondataavailable = (e) => {
          if (e.data && e.data.size > 0) gptRT.chunks.push(e.data);
        };
        rec.onstop = async () => {
          try { clearTimeout(gptRecordTimer); } catch(e) {}
          gptRecordTimer = null;
          const blob = new Blob(gptRT.chunks, { type: rec.mimeType || 'audio/webm' });
          // 若錄音太久，blob 會很大，可能造成 Vercel 回 413 / 500
          if (blob.size > 3_000_000) {
            gptSetStatus('錄音檔偏大（建議縮短錄音）');
          }
          try{ gptRT.stream?.getTracks()?.forEach(t=>t.stop()); }catch(e){}
          gptRT.stream = null;

          gptSetStatus('轉文字中…');
          try{
            const text = await gptTranscribeBlob(blob);
            gptSetTranscript(text);
            gptSetStatus('待命（可送出）');
          }catch(err){
            gptSetStatus('轉文字失敗');
            gptSetAnswer(`（轉文字失敗）${err?.message || err}`);
          } finally {
            gptRT.rec = null;
          }
        };

        rec.start();
        // 自動停止，避免錄太久造成 base64 太大
        try { clearTimeout(gptRecordTimer); } catch(e) {}
        gptRecordTimer = setTimeout(() => {
          try {
            if (gptRT.rec && gptRT.rec.state !== 'inactive') {
              gptSetStatus('已達錄音上限，已自動停止…');
              gptStopRecording(false);
            }
          } catch(e) {}
        }, GPT_MAX_RECORD_MS);

        gptSetStatus('錄音中…（說完按「停止」；最長 8 秒）');
      }catch(err){
        gptSetStatus('無法開啟麥克風（請允許權限）');
        gptSetAnswer(`（麥克風錯誤）${err?.message || err}`);
      }
    }

    function gptStopRecording(forceStopTracks){
      try { clearTimeout(gptRecordTimer); } catch(e) {}
      gptRecordTimer = null;
      try{
        if (gptRT.rec && gptRT.rec.state !== 'inactive'){
          gptRT.rec.stop();
        } else {
          gptRT.rec = null;
        }
      }catch(e){
        gptRT.rec = null;
      }

      if (forceStopTracks){
        try{ gptRT.stream?.getTracks()?.forEach(t=>t.stop()); }catch(e){}
        gptRT.stream = null;
      }
    }

    async function gptTranscribeBlob(blob){
      // iOS 對 btoa/大量 binary string 比較敏感：改用 FileReader 轉 dataURL 再取 base64
      const b64 = await blobToBase64(blob);

      const r = await fetch('/api/transcribe', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          audio_base64: b64,
          mime_type: blob.type || 'audio/webm'
        })
      });

      // 用 text() + JSON.parse：避免 iOS 上 response.json() 的怪錯誤訊息
      const rawText = await r.text();
      let data = {};
      try { data = JSON.parse(rawText); } catch(e) {
        throw new Error('Transcribe 回傳非 JSON：' + rawText.slice(0, 120));
      }

      if (!r.ok) throw new Error(data?.error || 'transcribe failed');
      return data.text || '';
    }

    function blobToBase64(blob){
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onloadend = () => {
          try{
            const res = reader.result || '';
            const idx = String(res).indexOf('base64,');
            if (idx === -1) return reject(new Error('無法取得 base64'));
            resolve(String(res).slice(idx + 7));
          }catch(e){ reject(e); }
        };
        reader.onerror = () => reject(reader.error || new Error('FileReader error'));
        reader.readAsDataURL(blob);
      });
    }

    async function gptSend(){
      if (gptRT.busy) return;
      const question = (gptRT.transcript || '').trim();
      if (!question){
        gptSetStatus('請先語音轉文字或打字輸入');
        return;
      }
      gptRT.busy = true;
      gptSetStatus('思考中…');
      gptSetAnswer('（思考中…）');

      const topicId = state?.current?.topicId || '';
      const lessonId = state?.current?.lessonId || '';
      const context = [
        topicId ? `topic=${topicId}` : '',
        lessonId ? `lesson=${lessonId}` : ''
      ].filter(Boolean).join(' ');

      try{
        const r = await fetch('/api/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question, context })
        });
        const rawText = await r.text();
        let data = {};
        try { data = JSON.parse(rawText); } catch(e) { throw new Error('Ask 回傳非 JSON：' + rawText.slice(0,120)); }
        if (!r.ok) throw new Error(data?.error || 'ask failed');

        gptSetAnswer(data.answer || '（沒有回答）');
        gptSetStatus('完成 ✅');

        try{
          if (typeof logEvent === 'function'){
            logEvent('gpt_question', { topicId, lessonId, data: { question } });
            logEvent('gpt_answer', { topicId, lessonId, data: { answer: data.answer || '' } });
          }
        }catch(e){}
      }catch(err){
        gptSetStatus('失敗');
        gptSetAnswer(`（錯誤）${err?.message || err}`);
      }finally{
        gptRT.busy = false;
      }
    }

    function gptOpenTyping(){
      const ov = document.getElementById('gptTypeOverlay');
      const inp = document.getElementById('gptTypeInput');
      if (!ov || !inp) return;
      ov.style.display = 'block';
      inp.value = gptRT.transcript || '';
      updateUiLock();
      setTimeout(()=>inp.focus(), 60);
    }

    function gptCloseTyping(){
      const ov = document.getElementById('gptTypeOverlay');
      if (ov) ov.style.display = 'none';
      updateUiLock();
    }

    async function gptSendTyping(){
      const inp = document.getElementById('gptTypeInput');
      if (!inp) return;
      const text = (inp.value || '').trim();
      if (!text) return;
      gptSetTranscript(text);
      gptCloseTyping();
      openGptVr();
      await gptSend();
    }


    window.addEventListener('DOMContentLoaded', () => {
      loadState();

      const gate  = document.getElementById('nameGate');
      const input = document.getElementById('studentNameInput');
      const btn   = document.getElementById('startBtn');

      const savedName = localStorage.getItem(STORAGE_KEY_NAME) || '';
      gate.style.display = 'flex';
      if (input) input.value = savedName;
      setTimeout(() => input && input.focus(), 50);

      function start(){
        const name = (input?.value || '').trim();
        if (!name) { input && input.focus(); return; }
        localStorage.setItem(STORAGE_KEY_NAME, name);
        gate.style.display = 'none';
        goTopicMenu();
      }
      btn?.addEventListener('click', start);
      input?.addEventListener('keydown', (e) => { if (e.key === 'Enter') start(); });

      // GPT 打字 overlay
      const typeSend = document.getElementById('gptTypeSendBtn');
      const typeClose = document.getElementById('gptTypeCloseBtn');
      const typeInput = document.getElementById('gptTypeInput');
      gptCloseTyping();
      typeSend?.addEventListener('click', () => gptSendTyping());
      typeClose?.addEventListener('click', () => gptCloseTyping());
      typeInput?.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') gptSendTyping();
      });

    });
  </script>
</head>
