<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>SVVR 360 Gallery (Single Scene Switch)</title>
  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>

  <style>
    /* 開頭輸入名字的遮罩 */
    #nameGate {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999; padding: 24px;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans TC", sans-serif;
    }
    #nameCard {
      width: min(520px, 100%);
      background: rgba(20,20,20,0.92);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
      color: #fff;
    }
    #nameCard h2 { margin: 0 0 10px; font-size: 18px; }
    #nameCard p { margin: 0 0 12px; font-size: 14px; opacity: .9; line-height: 1.4; }
    #nameRow { display:flex; gap: 10px; }
    #studentNameInput {
      flex: 1;
      font-size: 16px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08);
      color: #fff;
      outline: none;
    }
    #startBtn {
      font-size: 16px;
      padding: 10px 14px;
      border-radius: 10px;
      border: 0;
      background: #2f7cff;
      color: #fff;
      cursor: pointer;
    }
    #hint { margin-top: 10px; font-size: 12px; opacity: .8; }
  </style>

  <script>
    /**
     * 單一 <a-scene>，以 <a-sky> 換 src 切換場景（iOS 較穩）。
     * 需求：
     *  - scene1 = 主介面：顯示所有場景切換 + 進度按鈕
     *  - scene2/3/... = 內容場景：只顯示「回主介面」按鈕 + 各自知識點
     *  - 凝視點選：沿用 cursor fuse + raycaster: .clickable
     */

    const STORAGE_KEY = 'svvr_student_name_v1';

    const SCENES = {
      s1: { panoAsset: '#pano1', hotspotGroup: '#hotspots-s1', label: '主介面', isHub: true },
      s2: { panoAsset: '#pano2', hotspotGroup: '#hotspots-s2', label: '場景 2', isHub: false },
      s3: { panoAsset: '#pano3', hotspotGroup: '#hotspots-s3', label: '場景 3', isHub: false }
      // s4... 以同樣格式擴充
    };

    function setVisible(sel, visible) {
      const el = document.querySelector(sel);
      if (el) el.setAttribute('visible', visible);
    }

    function setHudText(text) {
      const hud = document.querySelector('#hudText');
      if (hud) hud.setAttribute('text', 'value', text);
    }

    function updateMenus(sceneId) {
      const isHub = !!SCENES[sceneId]?.isHub;
      setVisible('#hubMenu', isHub);      // s1 顯示
      setVisible('#backMenu', !isHub);    // s2+ 顯示
    }

    AFRAME.registerComponent('scene-switch', {
      schema: { to: {type: 'string'} },
      init: function () {
        this.onClick = this.onClick.bind(this);
        this.el.addEventListener('click', this.onClick);
      },
      remove: function () {
        this.el.removeEventListener('click', this.onClick);
      },
      onClick: function () {
        const targetId = this.data.to;
        const target = SCENES[targetId];
        if (!target) return;

        const sky = document.querySelector('#sky');
        const fade = document.querySelector('#fadePlane');

        const current = window.__CURRENT_SCENE__ || 's1';
        if (current === targetId) return;

        // 1) 淡出
        fade.setAttribute('visible', true);
        fade.emit('fadeOut');

        // 2) 等淡出完成後換圖 + 切換知識點群組 + 切換選單，再淡入
        setTimeout(() => {
          // 換 sky（核心切換方式）
          sky.setAttribute('material', 'src', target.panoAsset);

          // 切換知識點群組
          setVisible(SCENES[current].hotspotGroup, false);
          setVisible(target.hotspotGroup, true);

          // 更新目前場景
          window.__CURRENT_SCENE__ = targetId;

          // HUD 顯示（含名字）
          const name = localStorage.getItem(STORAGE_KEY) || '未命名';
          setHudText(`${name}｜${target.label}`);

          // 切換主介面/返回按鈕
          updateMenus(targetId);

          // 淡入
          fade.emit('fadeIn');
          setTimeout(() => fade.setAttribute('visible', false), 260);
        }, 220);
      }
    });

    // 頁面載入：處理名字 gate
    window.addEventListener('DOMContentLoaded', () => {
      const gate = document.getElementById('nameGate');
      const input = document.getElementById('studentNameInput');
      const btn = document.getElementById('startBtn');

      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        gate.style.display = 'none';
      } else {
        gate.style.display = 'flex';
        setTimeout(() => input.focus(), 50);
      }

      function start() {
        const name = (input.value || '').trim();
        if (!name) {
          input.focus();
          return;
        }
        localStorage.setItem(STORAGE_KEY, name);
        gate.style.display = 'none';

        // 初次 HUD
        setHudText(`${name}｜${SCENES[window.__CURRENT_SCENE__ || 's1'].label}`);
      }

      btn.addEventListener('click', start);
      input.addEventListener('keydown', (e) => { if (e.key === 'Enter') start(); });

      // 進度按鈕（先留測試；你之後可改為開啟進度面板）
      const pb = document.querySelector('#progressBtn');
      if (pb) pb.addEventListener('click', () => console.log('open progress'));
    });
  </script>
</head>

<body style="margin:0; background:#000;">
  <!-- 開頭輸入名字 -->
  <div id="nameGate" style="display:none;">
    <div id="nameCard">
      <h2>請輸入你的名字</h2>
      <p>用於學習紀錄與介面顯示。完成後即可開始操作（凝視停留即可點選）。</p>
      <div id="nameRow">
        <input id="studentNameInput" placeholder="例如：王小明" autocomplete="name" />
        <button id="startBtn">開始</button>
      </div>
      <div id="hint">提示：若你想讓每次都重新輸入，可改用 sessionStorage；目前用 localStorage 以避免 iOS 意外重整又要重填。</div>
    </div>
  </div>

  <a-scene
    renderer="colorManagement: true; physicallyCorrectLights: false"
    vr-mode-ui="enabled: true"
  >
    <a-assets>
      <!-- 你的 360 全景（請換成你的檔案） -->
      <img id="pano1" src="pano/scene1.jpg" crossorigin="anonymous">
      <img id="pano2" src="pano/scene2.jpg" crossorigin="anonymous">
      <img id="pano3" src="pano/scene3.jpg" crossorigin="anonymous">

      <!-- 縮圖（可選，用於「主介面」場景切換按鈕） -->
      <img id="thumb1" src="thumb/scene1.jpg" crossorigin="anonymous">
      <img id="thumb2" src="thumb/scene2.jpg" crossorigin="anonymous">
      <img id="thumb3" src="thumb/scene3.jpg" crossorigin="anonymous">
    </a-assets>

    <!-- 360 背景（切換就是改 src） -->
    <a-sky id="sky" radius="10" src="#pano1"></a-sky>

    <!-- 淡入淡出遮罩 -->
    <a-plane id="fadePlane"
      position="0 1.6 -0.5"
      width="2" height="2"
      material="color: #000; opacity: 0; transparent: true; shader: flat"
      visible="false"
      animation__out="property: material.opacity; to: 1; dur: 200; startEvents: fadeOut; easing: easeInQuad"
      animation__in="property: material.opacity; to: 0; dur: 220; startEvents: fadeIn; easing: easeOutQuad">
    </a-plane>

    <!-- 固定 HUD：顯示名字與場景 -->
    <a-entity id="hud" position="0 1.75 -1.2">
      <a-entity id="hudText"
        text="value: ; align: center; width: 2; color: #FFFFFF; wrapCount: 24"
        position="0 0 0">
      </a-entity>
    </a-entity>

    <!-- ✅ 主介面（s1）才顯示：所有場景切換 + 進度 -->
    <a-entity id="hubMenu" position="0 1.45 -2.2" rotation="0 0 0" visible="true">
      <!-- 你可以自行調整排版/數量：要切到哪幾個場景 -->
      <a-plane class="clickable" scene-switch="to: s2"
        position="-1.1 0 0" width="0.8" height="0.45"
        material="shader: flat; src: #thumb2; opacity: 0.95"></a-plane>

      <a-plane class="clickable" scene-switch="to: s3"
        position="0 0 0" width="0.8" height="0.45"
        material="shader: flat; src: #thumb3; opacity: 0.95"></a-plane>

      <a-plane class="clickable" id="progressBtn"
        position="1.1 0 0" width="0.8" height="0.45"
        material="shader: flat; color: #111; opacity: 0.95">
        <a-entity text="value: 進度; align: center; width: 2; color: #fff"
          position="0 0 0.01"></a-entity>
      </a-plane>
    </a-entity>

    <!-- ✅ 內容場景（s2+）才顯示：只留「回主介面」 -->
    <a-entity id="backMenu" position="0 1.45 -2.2" rotation="0 0 0" visible="false">
      <a-plane class="clickable" scene-switch="to: s1"
        width="0.95" height="0.45"
        material="shader: flat; color: #111; opacity: 0.95">
        <a-entity text="value: 回主介面; align: center; width: 3; color: #fff"
          position="0 0 0.01"></a-entity>
      </a-plane>
    </a-entity>

    <!-- 每個場景的知識點（只切 visible，不重建 scene） -->
    <a-entity id="hotspots-s1" visible="true">
      <!-- 主介面通常不放知識點；你要放也可以 -->
      <a-sphere class="clickable" position="2 1.4 -3" radius="0.08"
        material="color: #FFD54F; shader: flat"
        onclick="console.log('S1 hotspot A')">
      </a-sphere>
    </a-entity>

    <a-entity id="hotspots-s2" visible="false">
      <a-sphere class="clickable" position="-2 1.2 -3" radius="0.08"
        material="color: #4FC3F7; shader: flat"
        onclick="console.log('S2 hotspot A')">
      </a-sphere>
      <a-sphere class="clickable" position="0 1.0 -3" radius="0.08"
        material="color: #4FC3F7; shader: flat"
        onclick="console.log('S2 hotspot B')">
      </a-sphere>
    </a-entity>

    <a-entity id="hotspots-s3" visible="false">
      <a-sphere class="clickable" position="1 1.1 -3" radius="0.08"
        material="color: #A5D6A7; shader: flat"
        onclick="console.log('S3 hotspot A')">
      </a-sphere>
    </a-entity>

    <!-- 你的「凝視點選」：camera + cursor + raycaster 對 .clickable -->
    <a-entity id="rig">
      <a-camera position="0 1.6 0" wasd-controls-enabled="false">
        <a-cursor
          fuse="true"
          fuse-timeout="650"
          raycaster="objects: .clickable"
          material="color: white; shader: flat"
          geometry="primitive: ring; radiusInner: 0.01; radiusOuter: 0.017"
          animation__fusing="property: geometry.radiusInner; from: 0.01; to: 0.001; dur: 650; startEvents: fusing"
          animation__reset="property: geometry.radiusInner; to: 0.01; dur: 100; startEvents: mouseleave">
        </a-cursor>
      </a-camera>
    </a-entity>

    <script>
      // 初始化目前場景 & HUD（如果已經有名字就直接顯示）
      window.__CURRENT_SCENE__ = 's1';
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        setHudText(`${saved}｜${SCENES.s1.label}`);
      }
      // ✅ 一開始在主介面
      updateMenus('s1');
    </script>
  </a-scene>
</body>
</html>
