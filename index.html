<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>SVVR 三層架構骨架（Topic → Hub → Lesson）</title>
  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>

  <style>
    /* ====== 名字輸入 Gate（HTML Overlay） ====== */
    #nameGate{
      position:fixed; inset:0;
      background:rgba(0,0,0,0.85);
      display:flex; align-items:center; justify-content:center;
      z-index:9999; padding:24px;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,"Noto Sans TC",sans-serif;
      color:#fff;
    }
    #nameCard{
      width:min(460px,100%);
      background:rgba(20,20,20,0.92);
      border-radius:14px;
      padding:18px;
      box-shadow:0 10px 30px rgba(0,0,0,0.35);
    }
    #nameCard h2{ margin:0 0 10px; font-size:18px; }
    #nameCard p{ margin:0 0 12px; font-size:13px; opacity:.9; line-height:1.5; }
    #nameRow{ display:flex; gap:10px; }
    #studentNameInput{
      flex:1;
      font-size:16px;
      padding:10px 12px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,0.22);
      background:rgba(255,255,255,0.08);
      color:#fff;
      outline:none;
    }
    #startBtn{
      font-size:16px;
      padding:10px 14px;
      border-radius:10px;
      border:0;
      background:#2f7cff;
      color:#fff;
      cursor:pointer;
      white-space:nowrap;
    }
    #hint{ margin-top:10px; font-size:12px; opacity:.75; }
  </style>

  <script>
    // =========================
    // 0) 全域：狀態 / 設定
    // =========================
    const STORAGE_KEY_NAME  = 'svvr_student_name_v1';
    const STORAGE_KEY_STATE = 'svvr_state_v1';

    const GAZE_TIMEOUT_MS = 2000; // 凝視點選 3 秒

    // 三層架構：TopicMenu → Hub(topic) → Lesson(topic, lesson)
    const TOPICS = {
      t1: {
        name: "Topic 1｜植物分類 A",
        hubPano: "#pano_t1_hub",
        objectives: [
          "了解 Topic 1 的學習目標（示範）",
          "能辨識 3 種代表性特徵（示範）"
        ],
        lessons: [
          { id: "t1_l1", name: "單元 1（scene3）", pano: "#pano_t1_l1", hotspotsGroup: "#hotspots-t1_l1", totalHotspots: 5 },
          { id: "t1_l2", name: "單元 2（scene4）", pano: "#pano_t1_l2", hotspotsGroup: "#hotspots-t1_l2", totalHotspots: 5 },
          { id: "t1_l3", name: "單元 3（scene5）", pano: "#pano_t1_l3", hotspotsGroup: "#hotspots-t1_l3", totalHotspots: 5 },
        ],
        quiz: {
          questions: [
            { q: "（Topic1）題目 1：示範？", options: ["A", "B", "C"], answer: 1, explain: "解析：正確答案是 B（示範）" },
            { q: "（Topic1）題目 2：示範？", options: ["A", "B", "C"], answer: 0, explain: "解析：正確答案是 A（示範）" },
            { q: "（Topic1）題目 3：示範？", options: ["A", "B", "C"], answer: 2, explain: "解析：正確答案是 C（示範）" },
          ]
        }
      },
      t2: {
        name: "Topic 2｜植物分類 B",
        hubPano: "#pano_t2_hub",
        objectives: ["（示範）目標 1", "（示範）目標 2"],
        lessons: [
          { id: "t2_l1", name: "單元 1（scene3）", pano: "#pano_t2_l1", hotspotsGroup: "#hotspots-t2_l1", totalHotspots: 5 },
          { id: "t2_l2", name: "單元 2（scene4）", pano: "#pano_t2_l2", hotspotsGroup: "#hotspots-t2_l2", totalHotspots: 5 },
          { id: "t2_l3", name: "單元 3（scene5）", pano: "#pano_t2_l3", hotspotsGroup: "#hotspots-t2_l3", totalHotspots: 5 },
        ],
        quiz: {
          questions: [
            { q: "（Topic2）題目 1：示範？", options: ["A", "B", "C"], answer: 2, explain: "解析：正確答案是 C（示範）" },
            { q: "（Topic2）題目 2：示範？", options: ["A", "B", "C"], answer: 1, explain: "解析：正確答案是 B（示範）" },
            { q: "（Topic2）題目 3：示範？", options: ["A", "B", "C"], answer: 0, explain: "解析：正確答案是 A（示範）" },
          ]
        }
      },
      t3: {
        name: "Topic 3｜植物分類 C",
        hubPano: "#pano_t3_hub",
        objectives: ["（示範）目標 1", "（示範）目標 2"],
        lessons: [
          { id: "t3_l1", name: "單元 1（scene3）", pano: "#pano_t3_l1", hotspotsGroup: "#hotspots-t3_l1", totalHotspots: 5 },
          { id: "t3_l2", name: "單元 2（scene4）", pano: "#pano_t3_l2", hotspotsGroup: "#hotspots-t3_l2", totalHotspots: 5 },
          { id: "t3_l3", name: "單元 3（scene5）", pano: "#pano_t3_l3", hotspotsGroup: "#hotspots-t3_l3", totalHotspots: 5 },
        ],
        quiz: {
          questions: [
            { q: "（Topic3）題目 1：示範？", options: ["A", "B", "C"], answer: 0, explain: "解析：正確答案是 A（示範）" },
            { q: "（Topic3）題目 2：示範？", options: ["A", "B", "C"], answer: 2, explain: "解析：正確答案是 C（示範）" },
            { q: "（Topic3）題目 3：示範？", options: ["A", "B", "C"], answer: 1, explain: "解析：正確答案是 B（示範）" },
          ]
        }
      }
    };

    let state = {
      version: 1,
      current: { level: "topicMenu", topicId: null, lessonId: null },
      progress: {},
      progressSeen: {},
      quiz: {},
      quizRuntime: null,
      logs: []
    };

    function nowTs(){ return Date.now(); }
    function logEvent(type, extra={}){
      state.logs.push({ ts: nowTs(), type, ...extra });
      saveState();
    }

    function saveState(){
      try { localStorage.setItem(STORAGE_KEY_STATE, JSON.stringify(state)); } catch(e){}
    }
    function loadState(){
      try {
        const raw = localStorage.getItem(STORAGE_KEY_STATE);
        if (!raw) return;
        const parsed = JSON.parse(raw);
        if (parsed && typeof parsed === 'object') state = parsed;
      } catch(e){}
    }

    function qs(sel){ return document.querySelector(sel); }
    function setVisible(sel, visible){
      const el = qs(sel);
      if (!el) return;
      el.setAttribute('visible', !!visible);
    }
    function setText(sel, value){
      const el = qs(sel);
      if (!el) return;
      el.setAttribute('text', 'value', value);
    }

    function hideAllPages(){
      setVisible('#pageTopicMenu', false);
      setVisible('#pageHub', false);
      setVisible('#pageLesson', false);
      setVisible('#pageQuiz', false);
    }

    function setSky(srcSelector){
      const sky = qs('#sky');
      if (!sky) return;
      sky.setAttribute('material', 'src', srcSelector);
    }

    function setHud(title){
      const name = localStorage.getItem(STORAGE_KEY_NAME) || '未命名';
      setText('#hudText', `${name}｜${title}`);
    }

    function setClickableLock(locked){
      document.querySelectorAll('[data-hotspot="true"]').forEach(el => {
        if (locked) el.classList.remove('clickable');
        else el.classList.add('clickable');
      });
      document.querySelectorAll('[data-ui="true"]').forEach(el => {
        if (locked) el.classList.remove('clickable');
        else el.classList.add('clickable');
      });
      qs('#infoCloseBtn')?.classList.add('clickable');
    }

    function closeInfoPanel(){
      setVisible('#infoPanel', false);
      setClickableLock(false);
    }

    function goTopicMenu(){
      state.current = { level: "topicMenu", topicId: null, lessonId: null };
      saveState();
      closeInfoPanel();

      hideAllPages();
      setSky('#pano_topic_menu');
      setHud('Topic 選單');
      setVisible('#pageTopicMenu', true);

      logEvent('nav_topic_menu', {});
    }

    function initLessonProgress(lesson){
      if (!state.progress[lesson.id]) {
        state.progress[lesson.id] = {
          doneHotspots: 0,
          totalHotspots: lesson.totalHotspots || 5,
          completed: false
        };
      } else {
        state.progress[lesson.id].totalHotspots = lesson.totalHotspots || state.progress[lesson.id].totalHotspots || 5;
      }
      state.progressSeen ||= {};
      state.progressSeen[lesson.id] ||= {};
      saveState();
    }

    function isTopicComplete(topicId){
      const topic = TOPICS[topicId];
      if (!topic) return false;
      for (const lesson of topic.lessons) {
        initLessonProgress(lesson);
        if (!state.progress[lesson.id]?.completed) return false;
      }
      return true;
    }

    function refreshHubUI(topicId){
      const topic = TOPICS[topicId];
      if (!topic) return;

      setText('#hubTitle', `${topic.name}`);
      setText('#hubObjectives', topic.objectives.map((o,i)=>`${i+1}. ${o}`).join('\\n'));

      topic.lessons.forEach((lesson, idx) => {
        initLessonProgress(lesson);
        const p = state.progress[lesson.id];
        const percent = Math.round((p.doneHotspots / p.totalHotspots) * 100);
        setText(`#hubLessonLabel${idx+1}`, `${lesson.name}\\n${percent}%`);

        const fill = qs(`#hubBarFill${idx+1}`);
        if (fill) {
          fill.setAttribute('scale', `${Math.max(0, Math.min(1, p.doneHotspots / p.totalHotspots))} 1 1`);
        }
      });

      const unlocked = isTopicComplete(topicId);
      setText('#hubQuizStatus', unlocked ? '測驗：已解鎖' : '測驗：完成所有單元後解鎖');

      const quizState = state.quiz[topicId];
      const quizBtn = qs('#btnStartQuiz');
      if (quizBtn) {
        const canStart = unlocked && !(quizState && quizState.done);
        quizBtn.setAttribute('material', 'color', canStart ? '#2f7cff' : '#444');
        quizBtn.setAttribute('data-enabled', canStart ? 'true' : 'false');
      }

      if (quizState && quizState.done) {
        const acc = Math.round((quizState.score / quizState.total) * 100);
        const lines = [
          `測驗完成 ✅  正確率：${acc}%（${quizState.score}/${quizState.total}）`,
          '',
          ...quizState.details.map((d, i) => `Q${i+1}：${d.correct ? '✅' : '❌'}  ${d.explain}`)
        ];
        setVisible('#hubQuizResultPanel', true);
        setText('#hubQuizResultText', lines.join('\\n'));
      } else {
        setVisible('#hubQuizResultPanel', false);
        setText('#hubQuizResultText', '');
      }
    }

    function hideAllHotspotGroups(){
      for (const t of Object.values(TOPICS)) {
        for (const lesson of t.lessons) {
          setVisible(lesson.hotspotsGroup, false);
        }
      }
    }

    function patchHubLessonButtons(topicId){
      const topic = TOPICS[topicId];
      if (!topic) return;

      const btns = [qs('#btnLesson1'), qs('#btnLesson2'), qs('#btnLesson3')];
      topic.lessons.forEach((lesson, idx) => {
        const btn = btns[idx];
        if (!btn) return;
        btn.setAttribute('ui-action', `action: goLesson; a: ${topicId}; b: ${lesson.id}`);
      });

      const backBtn = qs('#btnBackToHub');
      if (backBtn) backBtn.setAttribute('ui-action', `action: goHub; a: ${topicId}`);

      const quizBtn = qs('#btnStartQuiz');
      if (quizBtn) quizBtn.setAttribute('ui-action', `action: startQuiz; a: ${topicId}`);
    }

    function goHub(topicId){
      const topic = TOPICS[topicId];
      if (!topic) return;

      patchHubLessonButtons(topicId);

      state.current = { level: "hub", topicId, lessonId: null };
      saveState();
      closeInfoPanel();

      hideAllPages();
      setSky(topic.hubPano);
      setHud(`Hub｜${topic.name}`);

      setVisible('#pageHub', true);
      refreshHubUI(topicId);

      logEvent('nav_hub', { topicId });
    }

    function goLesson(topicId, lessonId){
      const topic = TOPICS[topicId];
      if (!topic) return;
      const lesson = topic.lessons.find(x => x.id === lessonId);
      if (!lesson) return;

      state.current = { level: "lesson", topicId, lessonId };
      saveState();
      closeInfoPanel();

      hideAllPages();
      setSky(lesson.pano);
      setHud(`${topic.name}｜${lesson.name}`);

      setVisible('#pageLesson', true);
      hideAllHotspotGroups();
      setVisible(lesson.hotspotsGroup, true);

      initLessonProgress(lesson);

      logEvent('nav_lesson', { topicId, lessonId });
    }

    function faceCameraYaw(panelEl){
      const cam = qs('[camera]');
      if (!panelEl || !cam || !window.THREE) return;
      const panelPos = new THREE.Vector3();
      const camPos = new THREE.Vector3();
      panelEl.object3D.getWorldPosition(panelPos);
      cam.object3D.getWorldPosition(camPos);
      const dx = camPos.x - panelPos.x;
      const dz = camPos.z - panelPos.z;
      const yaw = Math.atan2(dx, dz) * (180 / Math.PI);
      panelEl.setAttribute('rotation', `0 ${yaw} 0`);
    }

    function markHotspotDone(topicId, lessonId, hotspotId){
      const topic = TOPICS[topicId];
      if (!topic) return;
      const lesson = topic.lessons.find(x => x.id === lessonId);
      if (!lesson) return;

      initLessonProgress(lesson);
      const p = state.progress[lesson.id];

      if (state.progressSeen?.[lesson.id]?.[hotspotId]) return;
      state.progressSeen[lesson.id][hotspotId] = true;

      p.doneHotspots = Math.min(p.totalHotspots, (p.doneHotspots || 0) + 1);
      p.completed = (p.doneHotspots >= p.totalHotspots);
      saveState();

      logEvent('hotspot_open', { topicId, lessonId, data: { hotspotId } });

      // 若回到 Hub，進度會更新；如果你想在 lesson 當下也顯示提示，可以加 HUD flash
    }

    AFRAME.registerComponent('hotspot-panel', {
      schema: {
        img: { type: 'selector' },
        side: { default: 'right' },
        distance: { default: 0.65 },
        hid: { default: '' }
      },
      init: function(){
        this.onClick = () => {
          const panel = qs('#infoPanel');
          const imgPlane = qs('#infoImage');
          if (!panel || !imgPlane || !window.THREE) return;

          const { topicId, lessonId } = state.current || {};
          if (!topicId || !lessonId) return;

          const hotspotId = this.data.hid || this.el.getAttribute('id') || ('hs_' + Math.random());
          markHotspotDone(topicId, lessonId, hotspotId);

          const imgEl = this.data.img;
          if (imgEl) imgPlane.setAttribute('material', 'src', `#${imgEl.id}`);
          else imgPlane.setAttribute('material', 'color', '#222');

          const p = new THREE.Vector3();
          this.el.object3D.getWorldPosition(p);

          const d = this.data.distance;
          let offset = new THREE.Vector3(d, 0, 0);
          if (this.data.side === 'left') offset.set(-d, 0, 0);
          if (this.data.side === 'up') offset.set(0, d * 0.6, 0);
          if (this.data.side === 'down') offset.set(0, -d * 0.6, 0);

          p.add(offset);
          panel.setAttribute('position', `${p.x} ${p.y} ${p.z}`);
          panel.setAttribute('visible', true);
          faceCameraYaw(panel);

          setClickableLock(true);
        };
        this.el.addEventListener('click', this.onClick);
      },
      remove: function(){
        this.el.removeEventListener('click', this.onClick);
      }
    });

    function startQuiz(topicId){
      if (!isTopicComplete(topicId)) return;
      if (state.quiz[topicId]?.done) return;

      closeInfoPanel();
      hideAllPages();
      setVisible('#pageQuiz', true);
      setHud(`測驗｜${TOPICS[topicId].name}`);

      state.quizRuntime = { topicId, idx: 0, chosen: [] };
      saveState();

      renderQuizQuestion();
      logEvent('quiz_start', { topicId });
    }

    function renderQuizQuestion(){
      const rt = state.quizRuntime;
      if (!rt) return;
      const topic = TOPICS[rt.topicId];
      const qObj = topic.quiz.questions[rt.idx];

      setText('#quizTitle', `${topic.name}｜小測驗（${rt.idx+1}/${topic.quiz.questions.length}）`);
      setText('#quizQuestion', qObj.q);

      qObj.options.forEach((opt, i) => {
        setText(`#quizOptText${i+1}`, opt);
        const btn = qs(`#quizOptBtn${i+1}`);
        if (btn) btn.setAttribute('material', 'color', '#333');
      });

      setText('#quizNextText', (rt.idx < topic.quiz.questions.length-1) ? '下一題' : '提交');
    }

    function chooseOption(optIndex){
      const rt = state.quizRuntime;
      if (!rt) return;
      const topic = TOPICS[rt.topicId];
      const qObj = topic.quiz.questions[rt.idx];

      rt.chosen[rt.idx] = optIndex;
      saveState();

      for (let i=0;i<qObj.options.length;i++){
        const btn = qs(`#quizOptBtn${i+1}`);
        if (btn) btn.setAttribute('material', 'color', (i===optIndex) ? '#2f7cff' : '#333');
      }

      logEvent('quiz_choose', { topicId: rt.topicId, data: { q: rt.idx, choice: optIndex } });
    }

    function nextOrSubmitQuiz(){
      const rt = state.quizRuntime;
      if (!rt) return;
      const topic = TOPICS[rt.topicId];
      const total = topic.quiz.questions.length;

      if (rt.chosen[rt.idx] === undefined) return;

      if (rt.idx < total-1){
        rt.idx += 1;
        saveState();
        renderQuizQuestion();
        return;
      }

      let score = 0;
      const details = topic.quiz.questions.map((q, i) => {
        const chosen = rt.chosen[i];
        const correct = (chosen === q.answer);
        if (correct) score += 1;
        return { chosen, correct, explain: q.explain };
      });

      state.quiz[rt.topicId] = {
        done: true,
        score,
        total,
        answers: rt.chosen.slice(),
        details,
        ts: nowTs()
      };
      state.quizRuntime = null;
      saveState();

      logEvent('quiz_submit', { topicId: rt.topicId, data: { score, total } });

      goHub(rt.topicId);
    }

    function downloadLog(){
      try{
        const name = localStorage.getItem(STORAGE_KEY_NAME) || 'user';
        const payload = JSON.stringify(state, null, 2);
        const blob = new Blob([payload], {type:'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `svvr_log_${name}_${Date.now()}.json`;
        a.click();
        URL.revokeObjectURL(url);
        logEvent('download_log', {});
      }catch(e){}
    }

    AFRAME.registerComponent('ui-action', {
      schema: { action: {type:'string'}, a: {type:'string'}, b:{type:'string'} },
      init: function(){
        this.onClick = () => {
          const act = this.data.action;

          if (act === 'goTopicMenu') return goTopicMenu();
          if (act === 'goHub')       return goHub(this.data.a);
          if (act === 'goLesson')    return goLesson(this.data.a, this.data.b);
          if (act === 'startQuiz') {
            // button may be visually disabled; still hard-block here
            if (qs('#btnStartQuiz')?.getAttribute('data-enabled') !== 'true') return;
            return startQuiz(this.data.a);
          }
          if (act === 'chooseOpt')   return chooseOption(parseInt(this.data.a,10));
          if (act === 'nextQuiz')    return nextOrSubmitQuiz();
          if (act === 'closeInfo')   return closeInfoPanel();
          if (act === 'downloadLog') return downloadLog();
          if (act === 'openGPT') {
            alert('GPT API：骨架先留按鈕，之後再接後端。');
            return;
          }
        };
        this.el.addEventListener('click', this.onClick);
      },
      remove: function(){
        this.el.removeEventListener('click', this.onClick);
      }
    });

    window.addEventListener('DOMContentLoaded', () => {
      loadState();

      // Name Gate
      const gate  = document.getElementById('nameGate');
      const input = document.getElementById('studentNameInput');
      const btn   = document.getElementById('startBtn');

      const savedName = localStorage.getItem(STORAGE_KEY_NAME);
      if (savedName) gate.style.display = 'none';
      else {
        gate.style.display = 'flex';
        setTimeout(() => input && input.focus(), 50);
      }

      function start(){
        const name = (input?.value || '').trim();
        if (!name) { input && input.focus(); return; }
        localStorage.setItem(STORAGE_KEY_NAME, name);
        gate.style.display = 'none';
        goTopicMenu();
      }
      btn?.addEventListener('click', start);
      input?.addEventListener('keydown', (e) => { if (e.key === 'Enter') start(); });

      // Restore navigation if name exists
      if (savedName) {
        const cur = state.current || { level: "topicMenu" };
        if (cur.level === 'hub' && cur.topicId) return goHub(cur.topicId);
        if (cur.level === 'lesson' && cur.topicId && cur.lessonId) return goLesson(cur.topicId, cur.lessonId);
        return goTopicMenu();
      }
    });
  </script>
</head>

<body style="margin:0; background:#000;">
  <!-- Name Gate -->
  <div id="nameGate" style="display:none;">
    <div id="nameCard">
      <h2>請輸入姓名</h2>
      <p>用於學習紀錄與介面顯示。完成後即可開始操作（凝視停留 <b>3 秒</b> 即可點選）。</p>
      <div id="nameRow">
        <input id="studentNameInput" placeholder="輸入名字..." autocomplete="name" />
        <button id="startBtn">開始體驗</button>
      </div>
      <div id="hint">提示：狀態會存於 localStorage，避免 iOS 偶發重整導致進度丟失。</div>
    </div>
  </div>

  <a-scene renderer="colorManagement: true; physicallyCorrectLights: false" vr-mode-ui="enabled: true">
    <a-assets>
      <img id="pano_topic_menu" src="pano/topic_menu.jpg" crossorigin="anonymous">

      <img id="pano_t1_hub" src="pano/t1_hub.jpg" crossorigin="anonymous">
      <img id="pano_t1_l1"  src="pano/t1_l1.jpg" crossorigin="anonymous">
      <img id="pano_t1_l2"  src="pano/t1_l2.jpg" crossorigin="anonymous">
      <img id="pano_t1_l3"  src="pano/t1_l3.jpg" crossorigin="anonymous">

      <img id="pano_t2_hub" src="pano/t2_hub.jpg" crossorigin="anonymous">
      <img id="pano_t2_l1"  src="pano/t2_l1.jpg" crossorigin="anonymous">
      <img id="pano_t2_l2"  src="pano/t2_l2.jpg" crossorigin="anonymous">
      <img id="pano_t2_l3"  src="pano/t2_l3.jpg" crossorigin="anonymous">

      <img id="pano_t3_hub" src="pano/t3_hub.jpg" crossorigin="anonymous">

                position="-1.0 -0.65 0.06"></a-entity>

      <a-box data-ui="true" class="clickable" ui-action="action: goHub; a: t2"
             position="0.0 -0.65 0" scale="0.75 0.28 0.1" color="#2f7cff"></a-box>
      <a-entity text="value: Topic 2; align: center; width: 2; color: #fff"
                position="0.0 -0.65 0.06"></a-entity>

      <a-box data-ui="true" class="clickable" ui-action="action: goHub; a: t3"
             position="1.0 -0.65 0" scale="0.75 0.28 0.1" color="#2f7cff"></a-box>
      <a-entity text="value: Topic 3; align: center; width: 2; color: #fff"

    </a-entity>

                  position="-1.2 0.55 0.06"></a-entity>

        <a-box data-ui="true" class="clickable" ui-action="action: openGPT"
               position="1.2 0.55 0" scale="0.7 0.22 0.1" color="#444"></a-box>

                  position="1.2 0.55 0.06"></a-entity>

        <a-plane width="2.4" height="0.45" position="0 0.25 0"
                 material="shader: flat; color:#111; opacity:0.9"></a-plane>

                  position="0 0.25 0.01"></a-entity>

        <a-plane width="2.4" height="0.85" position="0 -0.32 0"
                 material="shader: flat; color:#111; opacity:0.9"></a-plane>
        <a-entity id="hubObjectives" text="value: ; align: left; width: 2.2; color:#fff; wrapCount: 28; baseline: top"
                  position="-1.1 0.05 0.01"></a-entity>

        <a-box data-ui="true" class="clickable" id="btnLesson1"
               ui-action="action: goLesson; a: t1; b: t1_l1"

        <a-entity id="hubLessonLabel1" text="value: ; align: center; width: 2.2; color:#fff"

        <a-plane width="0.9" height="0.06" position="-0.8 -1.35 0" material="shader: flat; color:#333; opacity:0.95"></a-plane>
        <a-plane id="hubBarFill1" width="0.9" height="0.06" position="-1.25 -1.35 0.01"
                 scale="0 1 1" material="shader: flat; color:#7bdc6c; opacity:0.95"></a-plane>

        <a-box data-ui="true" class="clickable" id="btnLesson2"
               ui-action="action: goLesson; a: t1; b: t1_l2"

                 scale="0 1 1" material="shader: flat; color:#7bdc6c; opacity:0.95"></a-plane>

        <a-plane width="2.4" height="0.28" position="0 -1.65 0" material="shader: flat; color:#111; opacity:0.9"></a-plane>
        <a-entity id="hubQuizStatus" text="value: ; align: center; width: 3; color:#fff"
                  position="0 -1.65 0.01"></a-entity>

        <a-box data-ui="true" class="clickable" id="btnStartQuiz"

                  position="0 -1.95 0.06"></a-entity>

                    position="-1.1 0.5 0.01"></a-entity>

    </a-entity>

    <a-entity id="pageQuiz" visible="false" position="0 1.15 -2.0">

      <a-plane width="2.6" height="0.75" position="0 -0.55 0" material="shader: flat; color:#111; opacity:0.9"></a-plane>

                position="-1.25 -0.25 0.01"></a-entity>

      <a-box data-ui="true" class="clickable" id="quizOptBtn1" ui-action="action: chooseOpt; a: 0"

      <a-box data-ui="true" class="clickable" id="quizNextBtn" ui-action="action: nextQuiz"
             position="0 -2.15 0" scale="1.2 0.24 0.1" color="#2f7cff"></a-box>

      <a-plane id="infoCloseBtn" class="clickable" data-ui="true" ui-action="action: closeInfo"
               width="0.24" height="0.14" position="0.49 0.33 0.02"

      <a-entity text="value: 關閉; align: center; width: 2; color: #fff"
                position="0.49 0.33 0.03"></a-entity>
    </a-entity>

    <a-entity id="hotspots-t1_l1" visible="false">
      <a-sphere data-hotspot="true" class="clickable" radius="0.10" position="-1.4 2.0 -3.0" material="shader: flat; color:#FFD54F"

      <a-sphere data-hotspot="true" class="clickable" radius="0.10" position="-0.4 1.6 -2.8" material="shader: flat; color:#FFD54F"

      <a-sphere data-hotspot="true" class="clickable" radius="0.10" position="-0.2 1.7 -2.7" material="shader: flat; color:#4FC3F7"
                hotspot-panel="img: #info_placeholder; side: left; distance: 0.65; hid: t1_l2_h2"></a-sphere>
      <a-sphere data-hotspot="true" class="clickable" radius="0.10" position="1.2 1.45 -3.0" material="shader: flat; color:#4FC3F7"

    </a-entity>

      <a-sphere data-hotspot="true" class="clickable" radius="0.10" position="-1.6 2.0 -3.0" material="shader: flat; color:#A5D6A7"

      <a-sphere data-hotspot="true" class="clickable" radius="0.10" position="0.8 1.3 -2.9"  material="shader: flat; color:#A5D6A7"

      <a-sphere data-hotspot="true" class="clickable" radius="0.10" position="1.55 1.0 -3.1" material="shader: flat; color:#A5D6A7"

      <a-sphere data-hotspot="true" class="clickable" radius="0.10" position="0.1 0.7 -2.6"  material="shader: flat; color:#A5D6A7"

    <a-entity id="hotspots-t2_l1" visible="false"></a-entity>

    <a-entity id="hotspots-t3_l3" visible="false"></a-entity>

    <!-- Gaze cursor 3s -->
    <a-entity id="rig">
      <a-camera position="0 1.6 0" wasd-controls-enabled="false">
        <a-cursor fuse="true" fuse-timeout="3000"
          raycaster="objects: .clickable"
          material="color: white; shader: flat"
          geometry="primitive: ring; radiusInner: 0.01; radiusOuter: 0.017"
          animation__fusing="property: geometry.radiusInner; from: 0.01; to: 0.001; dur: 3000; startEvents: fusing"
          animation__reset="property: geometry.radiusInner; to: 0.01; dur: 120; startEvents: mouseleave">
        </a-cursor>
      </a-camera>
    </a-entity>

    <script>
      // 初始 HUD（若尚未輸入名字，會在 Gate 後才 goTopicMenu）
      setHud('Topic 選單');
    </script>
  </a-scene>
